<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes & Musings - Takeo Nishimata</title>
    <style>
        /* --- メインサイトのトーンを継承しつつアカデミックに調整 --- */
        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; 
            line-height: 1.8; 
            color: #2c3e50; 
            margin: 0; 
            padding: 0; 
            background-color: #f8f9fa; 
        }
        
        .container { 
            max-width: 850px; 
            margin: 0 auto; 
            padding: 3rem 2rem; 
            background-color: #fff; 
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.02);
        }

        /* アカデミックな装飾（セリフ体 / セクションタイトル） */
        h1, h2, .note-date {
            font-family: 'Georgia', 'Times New Roman', 'Shippori Mincho', serif;
        }

        h1 { 
            font-size: 2.5rem;
            font-weight: 400;
            border-bottom: 3px solid #2c3e50; 
            padding-bottom: 0.5rem; 
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .tagline {
            color: #7f8c8d;
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }
        
        /* 階層移動用のナビ */
        nav { 
            background-color: rgba(255, 255, 255, 0.98); 
            border-bottom: 1px solid #eee; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            padding: 1rem 0; 
        }
        .nav-container { 
            max-width: 850px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            padding: 0 2rem; 
        }
        .nav-links a { 
            text-decoration: none; 
            color: #34495e; 
            font-size: 0.9rem; 
            font-weight: 600;
        }

        /* --- Notesアーカイブ（リスト形式） --- */
        .archive {
            margin-top: 2rem;
        }

        .archive-item {
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .archive-item:last-child {
            border-bottom: none;
        }

        .note-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .note-date {
            color: #95a5a6;
            font-size: 0.95rem;
        }

        .note-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: #2c3e50;
            color: #fff;
            padding: 2px 8px;
            font-weight: bold;
        }

        .note-title {
            font-size: 1.4rem;
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
            display: block;
            margin-bottom: 0.8rem;
            line-height: 1.3;
        }

        .note-title:hover {
            text-decoration: underline;
        }

        .note-abstract {
            font-size: 0.95rem;
            color: #5d6d7e;
            text-align: justify;
        }

        /* 下部の信条セクション */
        #philosophy {
            margin-top: 5rem;
            padding: 2.5rem;
            background: #f4f7f9;
            border-left: 5px solid #2c3e50;
        }
        #philosophy h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="../index.html" class="nav-links">← Back to Home (Research)</a>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>Notes</h1>
            <p class="tagline">A brain dump of my physics thoughts.</p>
        </header>

        <main class="archive">
            
            <article class="archive-item">
                <div class="note-meta">
                    <span class="note-date">April 26, 2026</span>
                    <span class="note-category">Thermodynamics</span>
                </div>
                <a href="../The Significance of Adiabatic Processes in Thermodynamics- Integration of the Operational and Postulatory Approaches.pdf" target="_blank" class="note-title">
                    On the Unified Perspective of Tasaki and Callen: The Role of Adiabatic Processes
                </a>
                <p class="note-abstract">
                    田崎熱力学の操作的アプローチとCallenの公理的アプローチの統合に関する考察。断熱操作の経路独立性が、いかにして抽象的な内部エネルギーの公理に物理的実体を与えるか。
                </p>
            </article>

            

        </main>

        
    </div>

</body>
</html>
